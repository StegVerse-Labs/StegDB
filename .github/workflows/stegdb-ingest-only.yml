name: stegdb-ingest-only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout StegDB
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: python -m pip install --upgrade pip

      # --- NEW: clone org repos into workspace (public-only by default) ---
      - name: Clone StegVerse-Labs repos into workspace
        env:
          STEGVERSE_ORG: "stegverse-labs"
          # Optional: set this secret if you ever want to include private repos
          # or want higher API rate limits:
          STEGVERSE_AUDIT_TOKEN: ${{ secrets.STEGVERSE_AUDIT_TOKEN }}
          # Built-in token for this Actions run (works for rate limits; public cloning doesn't need it)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _workspace
          python tools/clone_org_repos.py --org "$STEGVERSE_ORG" --out "_workspace" --skip-private

      - name: Ingest metadata for all repos
        run: |
          python tools/ingest_repo_metadata.py --search-root _workspace
          python tools/evaluate_dependencies.py

      # --- NEW: generate global state artifacts from aggregated_files.jsonl ---
      - name: Build global state snapshot
        if: always()
        run: |
          python tools/build_global_state.py

      - name: Write dependency status (always)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p meta

          STATE="ok"
          REASON="healthy"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATE="broken"
            REASON="workflow-failure"
          fi

          HAS_AGG=false
          if [[ -s "meta/aggregated_files.jsonl" ]]; then
            HAS_AGG=true
          fi

          if [[ -f "scripts/write_dependency_status.py" ]]; then
            python scripts/write_dependency_status.py \
              --state "$STATE" \
              --reason "$REASON" \
              --details "{\"workflow\":\"${{ github.workflow }}\",\"job\":\"${{ github.job }}\",\"job_status\":\"${{ job.status }}\"}" \
              $( $HAS_AGG && echo "--has-aggregated-files" || true )
          else
            cat > meta/dependency_status.json <<EOF
          {
            "provider": "StegDB",
            "state": "${STATE}",
            "reason": "${REASON}",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "artifacts": { "aggregated_files_jsonl": ${HAS_AGG} },
            "details": {
              "workflow": "${{ github.workflow }}",
              "job": "${{ github.job }}",
              "job_status": "${{ job.status }}"
            }
          }
          EOF
          fi

      # --- NEW: Upload meta/ as artifact so you can open without relying on commits ---
      - name: Upload meta outputs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stegdb_meta_outputs
          path: meta
          if-no-files-found: warn

      - name: Commit dependency status (always)
        if: always() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add meta/dependency_status.json meta/*.json meta/*.jsonl meta/*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(meta): update ingest-only outputs [skip ci]"
          git push
